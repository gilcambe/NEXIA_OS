name: NEXIA CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    name: Verify dist + syntax + routes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Verify dist/
        run: node scripts/verify-dist.js

      - name: Syntax check netlify/functions
        run: |
          FAIL=0
          for f in netlify/functions/*.js; do
            node --check "$f" 2>/dev/null || { echo "SYNTAX ERROR: $f"; FAIL=1; }
          done
          [ $FAIL -eq 0 ] && echo "✅ All functions OK"
          exit $FAIL

      - name: HTTP smoke test
        env:
          FIREBASE_API_KEY: ci-test-key
          FIREBASE_AUTH_DOMAIN: nexia-ci-test.firebaseapp.com
          FIREBASE_PROJECT_ID: nexia-ci-test
        run: |
          PORT=3099 NODE_ENV=test node server.js &
          PID=$!
          sleep 3

          FAIL=0

          chk() {
            S=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3099$1")
            [ "$S" = "200" ] && echo "  ✅ $1" || { echo "  ❌ $1 → $S"; FAIL=1; }
          }

          chk_or() {
            S=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3099$1")
            if [ "$S" = "200" ] || [ "$S" = "$2" ]; then
              echo "  ✅ $1 ($S)"
            else
              echo "  ❌ $1 → $S (expected 200 or $2)"; FAIL=1
            fi
          }

          chk "/health"
          chk "/"
          chk "/login"
          chk "/ces"
          chk "/ces/admin"
          chk "/ces/checkin"
          chk "/ces/executivo"
          chk "/vp"
          chk "/vp/admin"
          chk "/bezsan"
          chk "/bezsan/admin"
          chk "/splash"
          chk "/splash/admin"
          chk "/nexia/sentinel"
          chk "/nexia/cortex"
          chk "/admin"
          chk_or "/api/firebase-config" "503"

          kill $PID 2>/dev/null
          exit $FAIL

      - name: Validate /health JSON
        run: |
          PORT=3098 NODE_ENV=test node server.js &
          PID=$!
          sleep 3
          curl -s http://localhost:3098/health -o /tmp/health.json
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('/tmp/health.json','utf8'));
            if (r.status !== 'ok') { console.error('health degraded:', JSON.stringify(r)); process.exit(1); }
            const missing = (r.dist||[]).filter(d => !d.ok).map(d => d.dir);
            if (missing.length) { console.error('dist missing:', missing); process.exit(1); }
            console.log('✅ /health OK — functions=' + r.functions);
          "
          kill $PID 2>/dev/null