<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="NEXIA OS — Acesso ao painel de controle.">
<title>NEXIA OS — Acesso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/core/nexia-boot.js"></script>
<script src="/core/config.js"></script>
<script src="/core/nav-guard.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}

:root{
  --cyan:#00E5FF;
  --cyan2:#00B8D4;
  --cyan-glow:rgba(0,229,255,.15);
  --cyan-brd:rgba(0,229,255,.22);
  --bg:#05070D;
  --bg2:#090C17;
  --bg3:#0F1624;
  --bg4:#161E2E;
  --brd:rgba(255,255,255,.07);
  --brd2:rgba(255,255,255,.12);
  --text:#FFFFFF;
  --text2:#C5D0E0;
  --text3:#7B90B0;
  --text4:#4A5C78;
  --red:#FF4D6A;
  --red-bg:rgba(255,77,106,.10);
  --red-brd:rgba(255,77,106,.25);
  --green:#23D160;
  --green-bg:rgba(35,209,96,.10);
  --green-brd:rgba(35,209,96,.25);
}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
  overflow-x:hidden;
  position:relative;
}

/* ── BACKGROUND FX ──────────────────────────── */
.bg-orb{
  position:fixed;
  pointer-events:none;
  border-radius:50%;
}
.bg-orb-1{
  width:min(600px,100vw);
  height:min(600px,100vw);
  top:-20%;left:50%;
  transform:translateX(-50%);
  background:radial-gradient(ellipse,rgba(0,229,255,.06) 0%,transparent 65%);
  animation:breathe 8s ease-in-out infinite;
}
.bg-orb-2{
  width:300px;height:300px;
  bottom:-10%;right:-5%;
  background:radial-gradient(ellipse,rgba(100,60,200,.05) 0%,transparent 70%);
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 20%,transparent 90%);
}
@keyframes breathe{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}

/* ── SPLASH ─────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.sp-icon{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,#0a1628,#0d2535);
  border:1px solid var(--cyan-brd);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px var(--cyan-glow);
  animation:iconPulse 2s ease infinite;
}
@keyframes iconPulse{0%,100%{box-shadow:0 0 20px var(--cyan-glow)}50%{box-shadow:0 0 50px rgba(0,229,255,.25)}}
.sp-label{
  font-size:22px;font-weight:800;letter-spacing:-.5px;
  color:var(--text);
}
.sp-label span{color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.15em;margin-left:6px;vertical-align:middle}
.sp-track{
  width:48px;height:2px;
  background:var(--brd);border-radius:1px;overflow:hidden;
}
.sp-fill{
  height:100%;width:0;background:var(--cyan);
  border-radius:1px;animation:fillBar .9s ease .2s forwards;
}
@keyframes fillBar{to{width:100%}}

/* ── CARD ───────────────────────────────────── */
.card{
  width:100%;max-width:400px;
  background:rgba(9,12,23,.97);
  border:1px solid var(--brd2);
  border-radius:20px;
  padding:36px 28px 32px;
  position:relative;z-index:1;
  box-shadow:
    0 0 0 1px rgba(0,229,255,.04),
    0 24px 60px rgba(0,0,0,.6),
    0 4px 12px rgba(0,0,0,.4);
  backdrop-filter:blur(20px);
  opacity:0;
  transform:translateY(12px);
  transition:opacity .45s ease, transform .45s ease;
}
.card.show{opacity:1;transform:translateY(0)}
.card-line{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--cyan2),transparent);
  border-radius:20px 20px 0 0;
}

/* ── LOGO ───────────────────────────────────── */
.logo{
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  margin-bottom:28px;
}
.logo-icon{
  width:48px;height:48px;border-radius:13px;
  background:linear-gradient(135deg,#0a1628,#0d2535);
  border:1px solid var(--cyan-brd);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,229,255,.1);
}
.logo-name{
  font-size:20px;font-weight:800;
  letter-spacing:-.3px;color:var(--text);
}
.logo-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--cyan);
  margin-top:-4px;
}

/* ── TABS ───────────────────────────────────── */
.tabs{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;margin-bottom:24px;
  background:var(--bg3);
  border:1px solid var(--brd);
  border-radius:11px;padding:4px;
}
.tab{
  padding:9px 0;border:1px solid transparent;
  border-radius:8px;background:transparent;
  color:var(--text3);
  font-family:'Syne',sans-serif;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{
  background:var(--bg4);
  border-color:var(--cyan-brd);
  color:var(--cyan);
}

/* ── ALERTS ─────────────────────────────────── */
.alert{
  border-radius:10px;padding:11px 14px;
  font-size:13px;line-height:1.4;
  margin-bottom:14px;display:none;
  font-weight:500;
}
.alert.show{display:flex;align-items:flex-start;gap:8px}
.alert-err{
  background:var(--red-bg);
  border:1px solid var(--red-brd);
  color:var(--red);
}
.alert-ok{
  background:var(--green-bg);
  border:1px solid var(--green-brd);
  color:var(--green);
}
.alert-icon{flex-shrink:0;margin-top:1px}

/* ── FIELD ───────────────────────────────────── */
.field{position:relative;margin-bottom:12px}
.field-label{
  display:block;font-size:11px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px;
  padding-left:2px;
}
.field-wrap{position:relative;display:flex;align-items:center}
.inp{
  width:100%;
  background:var(--bg4);
  border:1.5px solid var(--brd2);
  border-radius:10px;
  padding:13px 44px 13px 14px;
  /* CRITICAL FIX: cor do texto visível em todos os browsers */
  color:#FFFFFF !important;
  -webkit-text-fill-color:#FFFFFF !important;
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:500;
  outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
  -webkit-appearance:none;
  appearance:none;
  /* FIX iOS autofill color */
  -webkit-box-shadow:0 0 0 100px var(--bg4) inset !important;
  box-shadow:none;
}
.inp:focus{
  border-color:var(--cyan);
  background:rgba(22,30,46,.8);
  box-shadow:0 0 0 3px rgba(0,229,255,.08);
  -webkit-box-shadow:0 0 0 100px rgba(22,30,46,.95) inset, 0 0 0 3px rgba(0,229,255,.08) !important;
}
.inp::placeholder{color:var(--text4) !important;-webkit-text-fill-color:var(--text4) !important}
.inp:focus::placeholder{color:var(--text3) !important;-webkit-text-fill-color:var(--text3) !important}
/* Fix Safari autofill */
.inp:-webkit-autofill,
.inp:-webkit-autofill:hover,
.inp:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 100px var(--bg4) inset !important;
  -webkit-text-fill-color:#FFFFFF !important;
  caret-color:#FFFFFF;
  border-color:var(--brd2);
  transition:background-color 9999s ease-out;
}
/* Icone dentro do campo */
.field-icon{
  position:absolute;right:13px;
  color:var(--text4);pointer-events:none;
  display:flex;align-items:center;
  transition:color .2s;
}
.field:focus-within .field-icon{color:var(--cyan)}
/* Toggle senha */
.pwd-toggle{
  position:absolute;right:13px;
  background:none;border:none;
  color:var(--text4);cursor:pointer;
  padding:4px;display:flex;align-items:center;
  transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.pwd-toggle:hover{color:var(--cyan)}
.inp.has-toggle{padding-right:44px}

/* ── FORGOT ─────────────────────────────────── */
.forgot{
  display:flex;justify-content:flex-end;
  margin-top:-4px;margin-bottom:18px;
}
.forgot-btn{
  background:none;border:none;
  color:var(--text3);font-size:12px;
  cursor:pointer;padding:0;
  font-family:'Syne',sans-serif;
  transition:color .2s;
}
.forgot-btn:hover{color:var(--cyan)}

/* ── BUTTON ─────────────────────────────────── */
.btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,rgba(0,180,210,.15),rgba(0,150,180,.08));
  border:1.5px solid var(--cyan-brd);
  border-radius:11px;
  color:var(--cyan);
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;
  cursor:pointer;
  transition:all .2s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  letter-spacing:.02em;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  opacity:0;transition:opacity .2s;
}
.btn:hover::before{opacity:1}
.btn:hover{color:#fff;box-shadow:0 0 24px rgba(0,229,255,.2)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-text,.btn-spin{position:relative;z-index:1}
.btn-spin{
  display:none;width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .65s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .btn-text{display:none}
.btn.loading .btn-spin{display:block}

/* ── DIVIDER ────────────────────────────────── */
.divider{
  display:flex;align-items:center;gap:10px;
  margin:16px 0;
}
.divider-line{flex:1;height:1px;background:var(--brd)}
.divider-text{font-size:11px;color:var(--text4);white-space:nowrap}

/* ── FOOTER ─────────────────────────────────── */
.footer{
  margin-top:20px;text-align:center;
  font-size:11px;color:var(--text4);
}
.footer a{color:var(--text3);text-decoration:none;transition:color .2s}
.footer a:hover{color:var(--cyan)}

/* ── MOBILE FIRST (base) ────────────────────── */
@media(max-width:440px){
  body{padding:12px;justify-content:flex-start;padding-top:24px}
  .card{padding:28px 20px 24px;border-radius:18px}
  .logo{margin-bottom:22px}
  .inp{font-size:16px;padding:14px 44px 14px 14px} /* 16px prevents iOS zoom */
  .btn{padding:15px;font-size:15px}
}
@media(max-width:360px){
  .card{padding:22px 16px 20px}
}

/* ── FORGOT MODAL ──────────────────────────── */
#forgot-modal{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;opacity:0;visibility:hidden;
  transition:opacity .2s,visibility .2s;
}
#forgot-modal.show{opacity:1;visibility:visible}
.modal-card{
  background:var(--bg2);border:1px solid var(--brd2);
  border-radius:16px;padding:28px 24px;width:100%;max-width:360px;
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-ghost{
  flex:1;padding:11px;border-radius:9px;
  background:transparent;border:1px solid var(--brd2);
  color:var(--text3);font-family:'Syne',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;
}
.btn-ghost:hover{border-color:var(--brd);color:var(--text2)}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-grid"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2.2" width="22" height="22">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
  </div>
  <div class="sp-label">NEXIA <span>OS</span></div>
  <div class="sp-track"><div class="sp-fill"></div></div>
</div>

<!-- MAIN CARD -->
<div class="card" id="card">
  <div class="card-line"></div>

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2.2" width="22" height="22">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div class="logo-name">NEXIA OS</div>
    <div class="logo-tag">Plataforma de Inteligência</div>
  </div>

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Entrar</button>
    <button class="tab" id="tab-register" role="tab" aria-selected="false" onclick="switchTab('register')">Criar Conta</button>
  </div>

  <!-- Alerts -->
  <div class="alert alert-err" id="a-err" role="alert">
    <span class="alert-icon">⚠</span>
    <span id="a-err-msg"></span>
  </div>
  <div class="alert alert-ok" id="a-ok" role="alert">
    <span class="alert-icon">✓</span>
    <span id="a-ok-msg"></span>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login" role="tabpanel">
    <div class="field">
      <label class="field-label" for="l-email">E-mail</label>
      <div class="field-wrap">
        <input class="inp" id="l-email" type="email"
          placeholder="seu@email.com"
          autocomplete="email"
          inputmode="email"
          spellcheck="false"
          autocapitalize="none">
        <span class="field-icon">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="l-pass">Senha</label>
      <div class="field-wrap">
        <input class="inp has-toggle" id="l-pass" type="password"
          placeholder="Sua senha"
          autocomplete="current-password">
        <button class="pwd-toggle" type="button" aria-label="Mostrar/ocultar senha" onclick="togglePwd('l-pass',this)">
          <svg id="eye-l" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot">
      <button class="forgot-btn" type="button" onclick="openForgot()">Esqueci minha senha</button>
    </div>

    <button class="btn" id="btn-login" type="button" onclick="doLogin()">
      <span class="btn-text">Entrar na Plataforma</span>
      <span class="btn-spin"></span>
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none" role="tabpanel">
    <div class="field">
      <label class="field-label" for="r-name">Nome completo</label>
      <div class="field-wrap">
        <input class="inp" id="r-name" type="text"
          placeholder="Seu nome"
          autocomplete="name"
          autocapitalize="words">
        <span class="field-icon">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="r-email">E-mail</label>
      <div class="field-wrap">
        <input class="inp" id="r-email" type="email"
          placeholder="seu@email.com"
          autocomplete="email"
          inputmode="email"
          spellcheck="false"
          autocapitalize="none">
        <span class="field-icon">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="r-pass">Senha</label>
      <div class="field-wrap">
        <input class="inp has-toggle" id="r-pass" type="password"
          placeholder="Mínimo 6 caracteres"
          autocomplete="new-password">
        <button class="pwd-toggle" type="button" aria-label="Mostrar/ocultar senha" onclick="togglePwd('r-pass',this)">
          <svg id="eye-r" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="btn-register" type="button" onclick="doRegister()">
      <span class="btn-text">Criar Conta Gratuita</span>
      <span class="btn-spin"></span>
    </button>
  </div>

  <div class="footer">© 2026 NEXIA OS · <a href="mailto:suporte@nexia.app">Suporte</a></div>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgot-modal" role="dialog" aria-modal="true" aria-label="Recuperar senha">
  <div class="modal-card">
    <div class="modal-title">Recuperar senha</div>
    <div class="modal-sub">Digite seu e-mail e enviaremos um link para redefinir sua senha.</div>
    <div class="field">
      <label class="field-label" for="forgot-email">E-mail</label>
      <input class="inp" id="forgot-email" type="email"
        placeholder="seu@email.com"
        inputmode="email"
        spellcheck="false"
        autocapitalize="none">
    </div>
    <div id="forgot-msg" style="font-size:12px;margin-top:8px;display:none"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeForgot()">Cancelar</button>
      <button class="btn" style="flex:1.5" id="btn-forgot" onclick="doForgot()">
        <span class="btn-text">Enviar link</span>
        <span class="btn-spin"></span>
      </button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── SPLASH ───────────────────────────────────── */
setTimeout(() => {
  const splash = document.getElementById('splash');
  splash.classList.add('out');
  setTimeout(() => { document.getElementById('card').classList.add('show'); }, 280);
}, 1100);

/* ── TABS ─────────────────────────────────────── */
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('tab-login').setAttribute('aria-selected', isLogin);
  document.getElementById('tab-register').setAttribute('aria-selected', !isLogin);
  document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
  document.getElementById('form-register').style.display = isLogin ? 'none' : 'block';
  hideAlerts();
}

/* ── ALERTS ───────────────────────────────────── */
function showErr(msg) {
  document.getElementById('a-err-msg').textContent = msg;
  document.getElementById('a-err').classList.add('show');
  document.getElementById('a-ok').classList.remove('show');
}
function showOk(msg) {
  document.getElementById('a-ok-msg').textContent = msg;
  document.getElementById('a-ok').classList.add('show');
  document.getElementById('a-err').classList.remove('show');
}
function hideAlerts() {
  document.getElementById('a-err').classList.remove('show');
  document.getElementById('a-ok').classList.remove('show');
}

/* ── LOADING ──────────────────────────────────── */
function setLoading(id, on) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

/* ── PASSWORD TOGGLE ──────────────────────────── */
function togglePwd(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass
    ? `<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>`
    : `<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>`;
  btn.style.color = isPass ? 'var(--cyan)' : 'var(--text4)';
}

/* ── REDIRECT MAP ─────────────────────────────── */
const REDIRECT_MAP = {
  'cortex':'/nexia/cortex-app.html','flow':'/nexia/flow.html',
  'strike-center':'/nexia/strike-center.html','striker':'/nexia/nexia-striker.html',
  'studio':'/nexia/studio.html','sentinel':'/nexia/sentinel-dashboard.html',
  'swarm':'/nexia/swarm-control.html','pabx':'/nexia/pabx-softphone.html',
  'pki':'/nexia/pki-scanner.html','osint':'/nexia/osint-query.html',
  'pay':'/nexia/nexia-pay.html','store':'/nexia/nexia-store.html',
  'architect':'/nexia/architect.html','social-media':'/nexia/social-media-auto.html',
  'my-panel':'/nexia/my-panel.html','tenant-hub':'/nexia/tenant-hub.html',
  'master-admin':'/nexia/nexia-master-admin.html','qa-test-center':'/nexia/qa-test-center.html',
};

// Limpa redirect envenenado
(function(){ const s=localStorage.getItem('redirect_after_login'); if(s==='cortex') localStorage.removeItem('redirect_after_login'); })();

async function getRedirectUrl() {
  const _next = new URLSearchParams(window.location.search).get('next');
  if (_next && _next.startsWith('/')) localStorage.setItem('redirect_after_login', _next);
  return new Promise(resolve => {
    const timer = setTimeout(() => {
      const p = NexiaAuth.getProfile();
      const role = (p && p.role) || 'user';
      if (role==='master') { localStorage.removeItem('redirect_after_login'); resolve('/nexia/nexia-master-admin.html'); return; }
      if (role==='admin')  { localStorage.removeItem('redirect_after_login'); resolve('/nexia/tenant-hub.html'); return; }
      const pend = localStorage.getItem('redirect_after_login');
      if (pend) { localStorage.removeItem('redirect_after_login'); resolve(REDIRECT_MAP[pend]||(pend.startsWith('/')?pend:'/'+pend)); return; }
      const hp = p && p.homePage;
      resolve((hp&&hp.startsWith('/')&&!hp.startsWith('//'))?hp:'/nexia/my-panel.html');
    }, 1500);
    NexiaAuth.onChange(p => {
      if (!p) return;
      clearTimeout(timer);
      const role = p.role||'user';
      if (role==='master') { localStorage.removeItem('redirect_after_login'); resolve('/nexia/nexia-master-admin.html'); return; }
      if (role==='admin')  { localStorage.removeItem('redirect_after_login'); resolve('/nexia/tenant-hub.html'); return; }
      const pend = localStorage.getItem('redirect_after_login');
      if (pend) { localStorage.removeItem('redirect_after_login'); resolve(REDIRECT_MAP[pend]||(pend.startsWith('/')?pend:'/'+pend)); return; }
      const hp = p.homePage;
      resolve((hp&&hp.startsWith('/')&&!hp.startsWith('//'))?hp:'/nexia/my-panel.html');
    });
  });
}

/* ── LOGIN ────────────────────────────────────── */
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email || !pass) { showErr('Preencha e-mail e senha.'); return; }
  setLoading('btn-login', true);
  hideAlerts();
  const try_ = async () => {
    if (!NEXIA._ready) { setTimeout(try_, 150); return; }
    try {
      if (NEXIA.auth && firebase.auth)
        await NEXIA.auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
      await NexiaAuth.login(email, pass);
      showOk('Login realizado! Redirecionando...');
      window.location.href = await getRedirectUrl();
    } catch(e) {
      const msgs = {
        'auth/user-not-found':'E-mail não cadastrado.',
        'auth/wrong-password':'Senha incorreta.',
        'auth/invalid-credential':'E-mail ou senha incorretos.',
        'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.',
        'auth/network-request-failed':'Sem conexão com a internet.',
      };
      const code = e.code||'';
      showErr(msgs[code] || e.message || 'Erro ao fazer login.');
      setLoading('btn-login', false);
    }
  };
  try_();
}

/* ── REGISTER ─────────────────────────────────── */
async function doRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  if (!name)  { showErr('Digite seu nome.'); return; }
  if (!email) { showErr('Digite seu e-mail.'); return; }
  if (!pass || pass.length < 6) { showErr('Senha deve ter pelo menos 6 caracteres.'); return; }
  setLoading('btn-register', true);
  hideAlerts();
  const try_ = async () => {
    if (!NEXIA._ready) { setTimeout(try_, 150); return; }
    try {
      await NexiaAuth.register(email, pass, name, 'nexia');
      showOk('Conta criada! Redirecionando...');
      setTimeout(async () => { window.location.href = await getRedirectUrl(); }, 900);
    } catch(e) {
      const msgs = {
        'auth/email-already-in-use':'Este e-mail já está cadastrado.',
        'auth/weak-password':'Senha muito fraca. Use pelo menos 6 caracteres.',
        'auth/invalid-email':'E-mail inválido.',
        'auth/network-request-failed':'Sem conexão com a internet.',
      };
      showErr(msgs[e.code] || e.message || 'Erro ao criar conta.');
      setLoading('btn-register', false);
    }
  };
  try_();
}

/* ── FORGOT PASSWORD ──────────────────────────── */
function openForgot() {
  document.getElementById('forgot-modal').classList.add('show');
  document.getElementById('forgot-email').value = document.getElementById('l-email').value;
  document.getElementById('forgot-msg').style.display = 'none';
  setTimeout(() => document.getElementById('forgot-email').focus(), 50);
}
function closeForgot() { document.getElementById('forgot-modal').classList.remove('show'); }

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showForgotMsg('Digite seu e-mail.', false); return; }
  setLoading('btn-forgot', true);
  const try_ = async () => {
    if (!NEXIA._ready) { setTimeout(try_, 150); return; }
    try {
      await NEXIA.auth.sendPasswordResetEmail(email);
      showForgotMsg('Link enviado! Verifique sua caixa de entrada.', true);
      setLoading('btn-forgot', false);
      setTimeout(closeForgot, 2500);
    } catch(e) {
      showForgotMsg(e.code==='auth/user-not-found'?'E-mail não cadastrado.':e.message||'Erro ao enviar.', false);
      setLoading('btn-forgot', false);
    }
  };
  try_();
}

function showForgotMsg(msg, ok) {
  const el = document.getElementById('forgot-msg');
  el.textContent = msg;
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  el.style.display = 'block';
}

// Close modal on backdrop click
document.getElementById('forgot-modal').addEventListener('click', function(e) {
  if (e.target === this) closeForgot();
});

/* ── KEYBOARD ─────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('forgot-modal').classList.contains('show')) { doForgot(); return; }
  const isLogin = document.getElementById('tab-login').classList.contains('active');
  if (isLogin) doLogin(); else doRegister();
});
</script>
