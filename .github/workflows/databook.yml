name: Generate DataBook

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  databook:
    name: Generate PDF DataBook
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install reportlab
        run: pip install reportlab --quiet

      - name: Generate DataBook PDF
        run: python scripts/generate_databook.py

      - name: Upload DataBook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXIA-DataBook-${{ github.sha }}
          path: NEXIA_DataBook.pdf
          retention-days: 90

      - name: Commit DataBook to repo (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NEXIA_DataBook.pdf
          git diff --cached --quiet || git commit -m "docs: auto-update DataBook [skip ci]"
          git push || true
